<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mrvTRUST - Balança da Garagem (Zero Metrológico)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0c0c0e;
            --bg-panel: #16161a;
            --bg-input: #202024;
            --border-color: #2a2a30;
            --text-main: #f3f4f6;
            --text-support: #9ca3af;
            --gov-blue: #2563eb;
            --brand-green: #2ecc71;
            --danger-red: #e74c3c;
            --brand-orange: #f39c12;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .guarita-container {
            width: 800px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .guarita-header {
            border-bottom: 2px solid var(--gov-blue);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .guarita-header h2 { margin: 0; font-size: 1.4rem; text-transform: uppercase; color: var(--text-main); letter-spacing: 0.5px; }
        
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 25px;
        }

        /* CARD INDICADOR DA BALANÇA FÍSICA */
        .display-balanca {
            background-color: #000000;
            border: 2px solid #222;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 10px rgba(46, 204, 113, 0.2);
            margin-bottom: 20px;
        }
        .display-balanca span { font-size: 0.8rem; color: var(--text-support); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .display-balanca p { margin: 0; font-size: 3rem; font-weight: bold; color: var(--brand-green); letter-spacing: 2px; }

        /* CHECKLIST ESTREITO */
        .checklist-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .checklist-item {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
        }
        .checklist-item:hover { border-color: var(--gov-blue); }
        .checklist-item input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--gov-blue); }
        .checklist-label h4 { margin: 0; font-size: 0.9rem; color: var(--text-main); }
        .checklist-label p { margin: 2px 0 0 0; font-size: 0.75rem; color: var(--text-support); }

        /* SELEÇÃO DE VEÍCULO */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
        }
        .form-group label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-support); font-weight: 600; }
        .form-group select, .form-group input {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .btn-despacho {
            width: 100%;
            background-color: var(--gov-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }
        .btn-despacho:hover { background-color: #1d4ed8; }

        /* PAINEL DE ALERTA DE RETENÇÃO (POPUP DE ERRO INTERNO) */
        .alert-console {
            grid-column: span 2;
            background-color: rgba(231, 76, 60, 0.05);
            border: 1px dashed var(--danger-red);
            border-radius: 8px;
            padding: 15px;
            display: none;
            align-items: flex-start;
            gap: 15px;
        }
        .alert-console.active { display: flex; }
    </style>
</head>
<body>

    <div class="guarita-container">
        <header class="guarita-header">
            <h2><i class="fa-solid fa-scale-balanced"></i> Guarita de Saída - Homologação de TARA</h2>
            <div style="font-size: 0.8rem; color: var(--brand-orange); font-weight: bold;"><i class="fa-solid fa-microchip"></i> Modulo Garagem Ativo</div>
        </header>

        <div class="layout-grid">
            
            <section>
                <div style="font-size: 0.85rem; color: var(--text-support); margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;">
                    Checklist Mandatório de Condição de Marcha Forense:
                </div>
                <div class="checklist-box">
                    <label class="checklist-item">
                        <input type="checkbox" id="chk-tanque">
                        <div class="checklist-label">
                            <h4>1. Abastecimento Crítico (100% Tanque Cheio)</h4>
                            <p>Elimina volatilidade por queima volumétrica de diesel ao longo das rotas.</p>
                        </div>
                    </label>
                    <label class="checklist-item">
                        <input type="checkbox" id="chk-chorume">
                        <div class="checklist-label">
                            <h4>2. Coletor de Chorume Totalmente Zerado</h4>
                            <p>Válvulas de drenagem inspecionadas e tanque de percolados esvaziado na moega zero.</p>
                        </div>
                    </label>
                    <label class="checklist-item">
                        <input type="checkbox" id="chk-cabine">
                        <div class="checklist-label">
                            <h4>3. Cabine Desocupada (Sem Motorista a Bordo)</h4>
                            <p>Condutor e coletores devem desembarcar do chassi durante a tomada da TARA física.</p>
                        </div>
                    </label>
                    <label class="checklist-item">
                        <input type="checkbox" id="chk-moega">
                        <div class="checklist-label">
                            <h4>4. Moega e Prensa Totalmente Limpas</h4>
                            <p>Compartimento de carga livre de resíduos incrustados de coletas anteriores.</p>
                        </div>
                    </label>
                </div>
            </section>

            <aside>
                <div class="display-balanca">
                    <span>Peso de Balança Físico</span>
                    <p id="txt-peso-balanca">12520 <small style="font-size: 1.2rem; color: var(--text-support);">kg</small></p>
                </div>

                <div class="form-group">
                    <label>Selecione o Ativo (Caminhão)</label>
                    <select id="sel-veiculo" onchange="atualizarPesoSimulado()">
                        <option value="CAM-08">Caminhão #08 (ABC-1234)</option>
                        <option value="CAM-12">Caminhão #12 (XYZ-9876)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Simular Peso Injetado (kg)</label>
                    <input type="number" id="num-peso-input" value="12520" oninput="sincronizarDisplay()">
                    <span style="font-size: 0.7rem; color: var(--text-support);">Ajuste o peso para simular fraudes (Ex: ponha 13100kg para simular lastro de água furtivo).</span>
                </div>

                <button class="btn-despacho" onclick="enviarDespachoGaragem()">
                    <i class="fa-solid fa-paper-plane"></i> Validar & Liberar Rota
                </button>
            </aside>

            <div class="alert-console" id="painel-erro-forense">
                <i class="fa-solid fa-triangle-exclamation" style="color: var(--danger-red); font-size: 1.5rem; margin-top: 3px;"></i>
                <div>
                    <h3 style="margin: 0 0 5px 0; font-size: 0.95rem; color: var(--danger-red); text-transform: uppercase;">Retenção de Despacho Automatizada</h3>
                    <p id="txt-erro-detalhe" style="margin: 0; font-size: 0.85rem; color: var(--text-support); line-height: 1.4;"></p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api/v1/citymobile/garage/weigh-out';

        function sincronizarDisplay() {
            const peso = document.getElementById('num-peso-input').value;
            document.getElementById('txt-peso-balanca').innerHTML = `${peso} <small style="font-size: 1.2rem; color: var(--text-support);">kg</small>`;
        }

        function atualizarPesoSimulado() {
            const veiculo = document.getElementById('sel-veiculo').value;
            const inputPeso = document.getElementById('num-peso-input');
            if (veiculo === "CAM-08") {
                inputPeso.value = 12520; // Próximo à TARA nominal de 12500kg
            } else {
                inputPeso.value = 12810; // Próximo à TARA nominal de 12800kg
            }
            sincronizarDisplay();
        }

        async function enviarDespachoGaragem() {
            const painelErro = document.getElementById('painel-erro-forense');
            painelErro.classList.remove('active');

            const payload = {
                id_veiculo: document.getElementById('sel-veiculo').value,
                peso_tara_medido: parseInt(document.getElementById('num-peso-input').value),
                checklist_tanque_cheio: document.getElementById('chk-tanque').checked,
                checklist_chorume_vazio: document.getElementById('chk-chorume').checked,
                checklist_cabine_vazia: document.getElementById('chk-cabine').checked,
                checklist_moega_limpa: document.getElementById('chk-moega').checked
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    painelErro.classList.add('active');
                    document.getElementById('txt-erro-detalhe').innerHTML = `<strong>Status:</strong> ${result.status}<br><strong>Causa:</strong> ${result.message} ${result.desvia_quilos ? `<br><strong>Desvio Detetado:</strong> ${result.desvia_quilos}` : ''}`;
                } else {
                    alert(`✓ SUCESSO! mrvTRUST validou o Zero Metrológico.\nStatus: ${result.status}\nCódigo de Liberação assinado na Blockchain.`);
                }
            } catch (err) {
                alert("Falha crítica ao conectar com o barramento do API Gateway.");
            }
        }
    </script>
</body>
</html>
